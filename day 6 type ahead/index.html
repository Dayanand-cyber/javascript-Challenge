<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Type Ahead</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header class="hero">page for finding place</header>
    <form class="search-form">
      <div class="input-div">
        <input type="text" class="search" placeholder="Enter the place name" />
        <button class="btn">Search</button>
      </div>
      <ul class="suggestion">
        <li>filter for city or state</li>
      </ul>
    </form>

    <script>
      const endpoint =
        "https://gist.githubusercontent.com/Miserlou/c5cd8364bf9b2420bb29/raw/2bf258763cdddd704f8ffd3ea9a3e81d25e2c6f6/cities.json";

      const cities = [];
      fetch(endpoint)
        .then((blob) => blob.json())
        .then((data) => cities.push(...data));

      function findMatch(wordToFind, cities) {
        const regex = new RegExp(wordToFind, "gi");
        return cities.filter((place) => {
          return place.city.match(regex) || place.state.match(regex);
        });
      }
      function displayMatch() {
        const place = findMatch(this.value, cities);
        const html = place
          .map((place) => {
            return `
            <li>
                <span class="name">${place.city},${place.state}</span>
            </li>
            <br>
            `;
          })
          .join();
        suggestion.innerHTML = html;
      }

      const searchinput = document.querySelector(".search");
      const suggestion = document.querySelector(".suggestion");

      searchinput.addEventListener("change", displayMatch);
      searchinput.addEventListener("keyup", displayMatch);
    </script>
  </body>
</html>

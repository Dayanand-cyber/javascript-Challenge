<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="clock">
        <div class="clock-face">
            <div class="hand hour-hand"></div>
            <div class="hand min-hand"></div>
            <div class="hand sec-hand"></div>
        </div>
    </div>

    <script>
        const secondHand=document.querySelector('.sec-hand');
        const minHand=document.querySelector('.min-hand');
        const harHand=document.querySelector('.hour-hand')
        function moveHand()
        {
            const date=new Date();
            const second=date.getSeconds();
            const degg=((second/60)*360)+90;
            secondHand.style.transform=`rotate(${degg}deg)`;

            const minite=date.getMinutes();
            const Mdeg=((minite/60)*360)+90;
            minHand.style.transform=`transform(${Mdeg}deg)`;

            const hr=date.getHours();
            const hdeg=((hr/12)*360)+90;
            harHand.style.transform=`rotate(${hdeg}deg)`;
        }

        setInterval(moveHand,1000);
        moveHand();
        
    </script>
</body>
</html>

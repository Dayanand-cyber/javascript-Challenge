<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Console Tricks!</title>
    <link rel="icon" href="https://fav.farm/🔥" />
  </head>
  <body>
    <p onClick="makeGreen()">×BREAK×DOWN×</p>

    <script>
      const dogs = [
        { name: "Snickers", age: 2 },
        { name: "hugo", age: 8 },
      ];

      function makeGreen() {
        const p = document.querySelector("p");
        p.style.color = "#BADA55";
        p.style.fontSize = "50px";
      }

      // Regular
      console.log("hello world");

      // Interpolated
      let varr = "dev";
      console.log(`hello iam a ${varr}`);

      // Styled
      console.log("%c this is a text", "font-size:10px;background:red;");

      // warning!
      console.warn("this is bad");

      // Error :|
      console.error("damm ther is a error");

      // Info
      console.info("today was a hectic day");

      // Testing
      console.assert(1 === 2, "this is worng");

      // clearing
      //   console.clear()

      // Viewing DOM Elements
      p = document.querySelector("p");
      console.log(p);
      console.dir(p); //showes the function that dom element can you use

      // Grouping together
    //   dogs.forEach((dog) => {
    //     console.groupCollapsed(`${dog.name}`)
    //     console.log(`the name is ${dog.name}`)
    //     console.log(`the age is ${dog.age}`)
    //   });

      // counting
      console.count("dog")
      console.count("dog")
      console.count("dog")
      console.count("dog")
      console.count("dog")
      
      // timing
      console.time("time")
    </script>
  </body>
</html>

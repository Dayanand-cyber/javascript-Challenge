<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Variables</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h2>updating css variable using <span class="hl">JS</span></h2>
    <div class="container">
        <lable for="space">spacing</lable>
        <input id="spacing" type="range" name="spacing" min="10"  max="200" value="10" data-sizing="px">

        <lable for="blur">blur</lable>
        <input id="blur" type="range" name="blur" min="0" max="25" value="0" data-sizing="px">

        <lable for="base">base color</lable>
        <input id="base" type="color" name="base" value="#ffc600">
    </div>

    <img src="https://optc-ww.channel.or.jp/en/images/mv_img_pc.png" alt="image">


    <script>
        const inputs=document.querySelectorAll(".container input")

        function handleUpdate()
        {
            const suffix=this.dataset.sizing || '';
            console.log(suffix)
            document.documentElement.style.setProperty(`--${this.name}`,this.value+suffix)
        }

        inputs.forEach(input=> input.addEventListener("change",handleUpdate))
        inputs.forEach(input=> input.addEventListener("mousemove",handleUpdate))


    </script>
</body>
</html>

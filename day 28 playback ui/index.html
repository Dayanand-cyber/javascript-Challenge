<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Video Speed Scrubber</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="https://fav.farm/🔥" />
  </head>
  <body>
    <div class="wrapper">
      <video
        class="flex"
        width="765"
        height="430"
        src="./652333414.mp4"
        loop
        controls
      ></video>
      <div class="speed">
        <div class="speed-bar">1×</div>
      </div>
    </div>

    <script>
      const speed = document.querySelector(".speed");
      const bar = speed.querySelector(".speed-bar");
      const video = document.querySelector(".flex");

      console.log(speed);
      function handleSpeed(e) {
        const y = e.pageY - this.offsetTop;
        const percentage = y / this.offsetHeight;
        min = 0.4;
        max = 4;
        const height = Math.round(percentage * 100) + "%";
        const playbackspeed = percentage * (max - min) + min;
        bar.style.height = height;
        bar.textContent = playbackspeed.toFixed(2) + "x";
        video.playbackRate = playbackspeed;
      }
      speed.addEventListener("mousemove", handleSpeed);
    </script>
  </body>
</html>
